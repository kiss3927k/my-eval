<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한지쌤 AI 평가 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { Sparkles, ClipboardCheck, MessageSquare, Image: ImageIcon, RefreshCw, ChevronRight, User, BookOpen, FileText, X, MousePointerSquareDashed, CheckCircle, Download, History, TrendingUp, ChevronDown, ChevronUp, Search, Tag: TagIcon, Cloud, Lightbulb, PlusCircle, Filter, Edit3, Send, Table, GraduationCap, Loader2 } = lucide;

        // 에러 방지용 임시 설정
        const firebaseConfig = { apiKey: "temp", projectId: "temp" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const App = () => {
            const [step, setStep] = useState(1);
            const [standardTag, setStandardTag] = useState('');
            const [standard, setStandard] = useState('');
            const [studentName, setStudentName] = useState('');
            const [taskContent, setTaskContent] = useState('');

            return (
                <div className="min-h-screen bg-[#FDFCFB] text-slate-800 p-8 font-sans">
                    <div className="max-w-4xl mx-auto">
                        <header className="mb-10 flex items-center gap-4 border-b pb-6">
                            <GraduationCap className="w-10 h-10 text-amber-500" />
                            <h1 className="text-2xl font-black">한지쌤 AI 평가 시스템</h1>
                        </header>

                        <div className="bg-white p-10 rounded-[2rem] shadow-lg border">
                            {step === 1 && (
                                <div className="space-y-6">
                                    <h2 className="text-xl font-bold flex items-center gap-2">
                                        <BookOpen className="w-6 h-6 text-amber-500" /> 평가 활동지 설정
                                    </h2>
                                    <input type="text" className="w-full p-4 bg-slate-50 border rounded-xl" placeholder="성취기준 태그 (예: 4과02-01)" value={standardTag} onChange={(e) => setStandardTag(e.target.value)} />
                                    <textarea className="w-full h-32 p-4 bg-slate-50 border rounded-xl" placeholder="활동지 질문 내용" value={standard} onChange={(e) => setStandard(e.target.value)} />
                                    <button onClick={() => setStep(2)} className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">다음 단계</button>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="space-y-6">
                                    <h2 className="text-xl font-bold flex items-center gap-2">
                                        <User className="w-6 h-6 text-amber-500" /> 학생 과제 입력
                                    </h2>
                                    <input type="text" className="w-full p-4 bg-slate-50 border rounded-xl" placeholder="학생 이름" value={studentName} onChange={(e) => setStudentName(e.target.value)} />
                                    <textarea className="w-full h-48 p-4 bg-slate-50 border rounded-xl" placeholder="학생 답변 내용" value={taskContent} onChange={(e) => setTaskContent(e.target.value)} />
                                    <div className="flex gap-4">
                                        <button onClick={() => setStep(1)} className="flex-1 bg-slate-100 py-4 rounded-xl font-bold">뒤로가기</button>
                                        <button className="flex-[2] bg-amber-400 py-4 rounded-xl font-bold shadow-md">AI 평가 시작</button>
                                    </div>
                                </div>
                            )}
                        </div>
                        
                        <p className="mt-8 text-center text-slate-400 text-sm italic">
                            화면이 정상적으로 보인다면 이제 기능을 하나씩 연결하면 됩니다!
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
