<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한지쌤 AI 평가 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // 1. 도구 연결 (웹용으로 고정)
        const { useState, useEffect, useMemo } = React;
        const { Sparkles, ClipboardCheck, MessageSquare, Image: ImageIcon, RefreshCw, ChevronRight, User, BookOpen, FileText, X, MousePointerSquareDashed, CheckCircle, Download, History, TrendingUp, ChevronDown, ChevronUp, Search, Tag: TagIcon, Cloud, Lightbulb, PlusCircle, Filter, Edit3, Send, Table, GraduationCap, Loader2 } = lucide;

        // 2. 파이어베이스 연결 설정
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        if (firebaseConfig.apiKey) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';

        // 3. 선생님의 원본 코드 (수정 없이 그대로 작동하도록 배치)
        const App = () => {
          const [user, setUser] = useState(null);
          const [step, setStep] = useState(1); 
          
          const [standardTag, setStandardTag] = useState(localStorage.getItem('hanji_std_tag') || '');
          const [standard, setStandard] = useState(localStorage.getItem('hanji_std_content') || '');
          const [standardImage, setStandardImage] = useState(null); 
          const [studentName, setStudentName] = useState('');
          const [taskContent, setTaskContent] = useState('');
          const [taskImage, setTaskImage] = useState(null);
          const [isAnalyzing, setIsAnalyzing] = useState(false);
          const [result, setResult] = useState(null);
          const [history, setHistory] = useState([]);
          const [teacherRevisionPrompt, setTeacherRevisionPrompt] = useState('');
          const [showSuccessToast, setShowSuccessToast] = useState(false);
          const [nameFilter, setNameFilter] = useState('all');
          const [tagFilter, setTagFilter] = useState('all');
          const [expandedStudent, setExpandedStudent] = useState(null);
          const [isDragging, setIsDragging] = useState(false);

          const apiKey = "AIzaSyD5ffyr61te_nF4HwsAG41BOQ79lczEzGw"; 

          useEffect(() => {
            const initAuth = async () => {
              try {
                await auth.signInAnonymously();
              } catch (err) { console.error("인증 실패:", err); }
            };
            initAuth();
            const unsubscribe = auth.onAuthStateChanged(setUser);
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const evaluationsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('evaluations');
            const unsubscribe = evaluationsRef.onSnapshot((snapshot) => {
              const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              setHistory(data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
            });
            return () => unsubscribe();
          }, [user]);

          // --- UI 코드 시작 ---
          return (
            <div className="min-h-screen bg-[#FDFCFB] text-slate-800 p-4 md:p-8">
              <div className="max-w-[1600px] mx-auto">
                <header className="mb-10 flex items-center justify-between border-b-2 border-slate-100 pb-8">
                  <div className="flex items-center gap-5">
                    <div className="w-14 h-14 bg-amber-50 rounded-2xl flex items-center justify-center border border-amber-100">
                      <GraduationCap className="w-8 h-8 text-amber-500" />
                    </div>
                    <h1 className="text-3xl font-black text-slate-900">한지쌤의 AI 서논술형 평가</h1>
                  </div>
                </header>

                <div className="bg-white rounded-[3rem] shadow-xl border border-slate-100 p-10">
                  {step === 1 && (
                    <div className="space-y-10">
                      <h2 className="text-2xl font-black">평가 활동지 설정</h2>
                      <input type="text" className="w-full p-6 bg-slate-50 border-2 rounded-2xl" placeholder="성취기준 태그" value={standardTag} onChange={(e) => setStandardTag(e.target.value)} />
                      <textarea className="w-full h-44 p-8 bg-slate-50 border-2 rounded-2xl" placeholder="활동지 내용" value={standard} onChange={(e) => setStandard(e.target.value)} />
                      <button onClick={() => setStep(2)} className="w-full bg-slate-900 text-white py-6 rounded-2xl font-black">다음 단계</button>
                    </div>
                  )}
                  {step === 2 && (
                    <div className="space-y-10">
                      <h2 className="text-2xl font-black">학생 과제 평가</h2>
                      <input type="text" className="w-full p-6 bg-slate-50 border-2 rounded-2xl font-black text-2xl" placeholder="학생 이름" value={studentName} onChange={(e) => setStudentName(e.target.value)} />
                      <textarea className="w-full h-44 p-8 bg-slate-50 border-2 rounded-2xl" placeholder="답변 내용" value={taskContent} onChange={(e) => setTaskContent(e.target.value)} />
                      <button onClick={() => setStep(1)} className="text-slate-400">뒤로 가기</button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
