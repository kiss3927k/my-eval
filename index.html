<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한지쌤 AI 평가 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // 엔진 설정 (선생님 코드와 호환되도록 연결)
        const { useState, useEffect, useMemo } = React;
        const initializeApp = firebase.initializeApp;
        const getAuth = () => firebase.auth();
        const signInWithCustomToken = (auth, token) => auth.signInWithCustomToken(token);
        const signInAnonymously = (auth) => auth.signInAnonymously();
        const onAuthStateChanged = (auth, cb) => auth.onAuthStateChanged(cb);
        const getFirestore = () => firebase.firestore();
        const collection = (db, ...path) => db.collection(path.join('/'));
        const addDoc = (col, data) => col.add(data);
        const onSnapshot = (ref, cb) => ref.onSnapshot(cb);
        const query = (ref) => ref;
        const doc = (db, ...path) => db.doc(path.join('/'));
        const setDoc = (ref, data) => ref.set(data);

        const { 
          Sparkles, ClipboardCheck, MessageSquare, Image: ImageIcon, 
          RefreshCw, ChevronRight, User, BookOpen, FileText, X, 
          MousePointerSquareDashed, CheckCircle, Download, History, 
          TrendingUp, ChevronDown, ChevronUp, Search, Tag: TagIcon, 
          Cloud, Lightbulb, PlusCircle, Filter, Edit3, Send, Table, GraduationCap,
          Loader2
        } = lucide;

        // --- 여기서부터 선생님의 원본 코드 시작 (수정 없음) ---

        const firebaseConfig = { apiKey: "AIzaSyD5ffyr61te_nF4HwsAG41BOQ79lczEzGw", projectId: "hanji-eval" }; // 임시 설정
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'default-app-id';

        const App = () => {
          const [user, setUser] = useState(null);
          const [step, setStep] = useState(1); 
          const [standardTag, setStandardTag] = useState(localStorage.getItem('hanji_std_tag') || '');
          const [standard, setStandard] = useState(localStorage.getItem('hanji_std_content') || '');
          const [standardImage, setStandardImage] = useState(null); 
          const [studentName, setStudentName] = useState('');
          const [taskContent, setTaskContent] = useState('');
          const [taskImage, setTaskImage] = useState(null);
          const [isAnalyzing, setIsAnalyzing] = useState(false);
          const [result, setResult] = useState(null);
          const [history, setHistory] = useState([]);
          const [teacherRevisionPrompt, setTeacherRevisionPrompt] = useState('');
          const [showSuccessToast, setShowSuccessToast] = useState(false);
          const [nameFilter, setNameFilter] = useState('all');
          const [tagFilter, setTagFilter] = useState('all');
          const [expandedStudent, setExpandedStudent] = useState(null);
          const [isDragging, setIsDragging] = useState(false);

          const apiKey = "AIzaSyD5ffyr61te_nF4HwsAG41BOQ79lczEzGw"; 

          useEffect(() => {
            auth.signInAnonymously().catch(err => console.error(err));
            const unsubscribe = auth.onAuthStateChanged(setUser);
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const evaluationsRef = db.collection('evaluations');
            const unsubscribe = evaluationsRef.onSnapshot((snapshot) => {
              const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              setHistory(data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
            });
            return () => unsubscribe();
          }, [user]);

          // (중략 - 선생님의 나머지 모든 로직과 UI 코드가 이 안에 그대로 들어갑니다)
          // 선생님, 아래에 return () 부분에 선생님이 만드신 그 멋진 디자인을 붙여넣으세요.

          return (
            <div className="min-h-screen bg-[#FDFCFB] text-slate-800 p-8 font-sans">
              <div className="max-w-4xl mx-auto">
                <header className="mb-10 flex items-center gap-5 border-b pb-8">
                  <GraduationCap className="w-12 h-12 text-amber-500" />
                  <h1 className="text-3xl font-black text-slate-900">한지쌤의 AI 서논술형 평가</h1>
                </header>
                <div className="bg-white p-10 rounded-[3rem] shadow-xl border">
                    {step === 1 && (
                        <div className="space-y-6">
                            <h2 className="text-xl font-black">평가 설정</h2>
                            <input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl" placeholder="성취기준 태그" value={standardTag} onChange={(e)=>setStandardTag(e.target.value)} />
                            <textarea className="w-full h-32 p-4 bg-slate-50 border rounded-2xl" value={standard} onChange={(e)=>setStandard(e.target.value)} />
                            <button onClick={()=>setStep(2)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">다음 학생 평가</button>
                        </div>
                    )}
                    {step === 2 && (
                        <div className="space-y-6">
                            <h2 className="text-xl font-black">학생 과제</h2>
                            <input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl" placeholder="학생 이름" value={studentName} onChange={(e)=>setStudentName(e.target.value)} />
                            <textarea className="w-full h-48 p-4 bg-slate-50 border rounded-2xl" value={taskContent} onChange={(e)=>setTaskContent(e.target.value)} />
                            <button onClick={()=>setStep(1)} className="text-slate-400">뒤로 가기</button>
                        </div>
                    )}
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
