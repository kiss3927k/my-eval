<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한지쌤 AI 평가 시스템</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // 도구 설정
        const { useState, useEffect, useMemo } = React;
        const { Sparkles, ClipboardCheck, MessageSquare, Image: ImageIcon, RefreshCw, ChevronRight, User, BookOpen, FileText, X, MousePointerSquareDashed, CheckCircle, Download, History, TrendingUp, ChevronDown, ChevronUp, Search, Tag: TagIcon, Cloud, Lightbulb, PlusCircle, Filter, Edit3, Send, Table, GraduationCap, Loader2 } = lucide;

        // --- 선생님의 원본 코드 시작 ---
        
        // 파이베이서 설정 (임시 방어 코드 포함)
        const firebaseConfig = { apiKey: "temp", projectId: "temp" };
        if (!window.firebase.apps.length) {
            window.firebase.initializeApp(firebaseConfig);
        }
        const auth = window.firebase.auth();
        const db = window.firebase.firestore();

        const App = () => {
            const [step, setStep] = useState(1);
            const [standardTag, setStandardTag] = useState(localStorage.getItem('hanji_std_tag') || '');
            const [standard, setStandard] = useState(localStorage.getItem('hanji_std_content') || '');
            const [studentName, setStudentName] = useState('');
            const [taskContent, setTaskContent] = useState('');
            const apiKey = "AIzaSyD5ffyr61te_nF4HwsAG41BOQ79lczEzGw";

            return (
                <div className="min-h-screen bg-[#FDFCFB] text-slate-800 p-4 md:p-8 font-sans">
                    <div className="max-w-[1600px] mx-auto">
                        <header className="mb-10 flex flex-col md:flex-row items-center justify-between gap-6 border-b-2 border-slate-100 pb-8">
                            <div className="flex items-center gap-5">
                                <div className="w-14 h-14 bg-amber-50 rounded-2xl flex items-center justify-center border border-amber-100 shadow-sm">
                                    <GraduationCap className="w-8 h-8 text-amber-500" />
                                </div>
                                <h1 className="text-3xl font-black text-slate-900 tracking-tight">한지쌤의 AI 서논술형 평가</h1>
                            </div>
                        </header>

                        <div className="bg-white rounded-[3rem] shadow-xl border border-slate-100 overflow-hidden">
                            <div className="p-8 md:p-14">
                                {step === 1 && (
                                    <div className="space-y-10">
                                        <h2 className="text-2xl font-black text-slate-900 flex items-center gap-4"><BookOpen className="w-8 h-8 text-amber-500" /> 평가 활동지 설정</h2>
                                        <div className="space-y-8">
                                            <div className="space-y-3">
                                                <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1"><TagIcon className="w-4 h-4 inline mr-1" /> 성취기준 태그</label>
                                                <input type="text" className="w-full p-6 bg-slate-50 border-2 border-slate-50 rounded-[1.5rem] outline-none font-black text-lg focus:border-amber-400 transition-all shadow-inner" placeholder="예: 4과02-01" value={standardTag} onChange={(e) => setStandardTag(e.target.value)} />
                                            </div>
                                            <div className="space-y-3">
                                                <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1"><FileText className="w-4 h-4 inline mr-1" /> 활동지 내용</label>
                                                <textarea className="w-full h-44 p-8 bg-slate-50 border-2 border-slate-50 rounded-[1.5rem] outline-none focus:border-amber-400 transition-all text-slate-700 font-medium shadow-inner" placeholder="질문들을 적어주세요." value={standard} onChange={(e) => setStandard(e.target.value)} />
                                            </div>
                                        </div>
                                        <button onClick={() => setStep(2)} className="w-full bg-slate-900 text-white py-6 rounded-[1.5rem] font-black text-xl hover:bg-slate-800 transition-all shadow-xl">다음 단계</button>
                                    </div>
                                )}
                                {step === 2 && (
                                    <div className="space-y-12">
                                        <div className="flex items-center justify-between border-b-2 border-slate-50 pb-8">
                                            <div className="flex items-center gap-5"><div className="bg-amber-400 text-white px-5 py-2 rounded-2xl font-black text-sm">{standardTag}</div><h2 className="text-3xl font-black text-slate-900 tracking-tighter">학생 과제 평가</h2></div>
                                            <button onClick={() => setStep(1)} className="text-sm font-black text-slate-400 hover:text-slate-600 bg-slate-50 px-5 py-2.5 rounded-2xl">기준 수정</button>
                                        </div>
                                        <div className="space-y-10">
                                            <div className="space-y-4">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-2 flex items-center gap-2"><User className="w-4 h-4"/> 학생 이름</label>
                                                <input type="text" className="w-full p-7 bg-slate-50 border-2 border-slate-50 rounded-[2rem] outline-none font-black text-3xl focus:border-amber-400 transition-all shadow-inner" placeholder="이름 입력" value={studentName} onChange={(e) => setStudentName(e.target.value)} />
                                            </div>
                                            <div className="space-y-4">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-2">답변 내용</label>
                                                <textarea className="w-full h-60 p-8 bg-slate-50 border-2 border-slate-50 rounded-[2rem] outline-none focus:border-amber-400 transition-all text-base font-medium shadow-inner" placeholder="학생의 답변을 입력하세요." value={taskContent} onChange={(e) => setTaskContent(e.target.value)} />
                                            </div>
                                        </div>
                                        <button className="w-full bg-amber-400 text-slate-900 py-8 rounded-[2rem] font-black text-2xl hover:bg-amber-300 transition-all flex items-center justify-center gap-5 shadow-lg">
                                            <Sparkles className="w-8 h-8" /> 교사 정밀 평가 시작 (준비 중)
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
